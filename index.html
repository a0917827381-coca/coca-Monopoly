<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>渴口手沖大富翁 - 完整版</title>
    <style>
        :root { --tile-size: 180px; --map-size: calc(var(--tile-size) * 8); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a252f; font-family: 'Helvetica Neue', Arial, sans-serif; touch-action: none; }
        
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: grab; display: none; }
        #viewport:active { cursor: grabbing; }

        #map {
            width: var(--map-size); height: var(--map-size); position: absolute; top: 0; left: 0; background-color: #ecf0f1; 
            transform-origin: top left; transition: transform 0.1s ease-out; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* 中央裝飾區 */
        #map-center-decor {
            position: absolute; top: var(--tile-size); left: var(--tile-size);
            width: calc(var(--map-size) - var(--tile-size) * 2); height: calc(var(--map-size) - var(--tile-size) * 2);
            background-color: #fdfbf7; border: 4px dashed #bdc3c7; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0.8; pointer-events: none;
        }
        #map-center-decor h1 { font-size: 120px; color: #e67e22; margin: 0; text-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
        #map-center-decor h2 { font-size: 60px; color: #7f8c8d; margin: 0; }

        /* 格子樣式 */
        .tile {
            width: var(--tile-size); height: var(--tile-size); position: absolute; box-sizing: border-box; 
            border: 3px solid #34495e; background-color: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; cursor: pointer; 
        }
        .tile-id { font-size: 12px; color: #7f8c8d; position: absolute; top: 8px; left: 8px; }
        .tile-title { font-size: 20px; font-weight: bold; color: #2c3e50; pointer-events: none; }
        .tile-desc { font-size: 14px; color: #e74c3c; margin-top: 8px; pointer-events: none; }
        .tile-owner { font-size: 14px; color: #27ae60; font-weight: bold; margin-top: 5px; height: 18px; pointer-events: none;}
        .tile-level { font-size: 14px; color: #f39c12; margin-top: 2px; height: 18px; pointer-events: none;}
        
        .tile.corner { background-color: #f1c40f; } 
        .tile.event { background-color: #9b59b6; color: white; }
        .tile.event .tile-title, .tile.event .tile-desc { color: white; }

        /* 角色與血條 */
        .character {
            width: 60px; height: 60px; position: absolute; border-radius: 50%; 
            background-size: contain; background-repeat: no-repeat; background-position: center;
            background-color: #fff; border: 3px solid #34495e; box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            transition: left 0.2s linear, top 0.2s linear; /* 步行速度 */
            z-index: 10; pointer-events: none; 
        }
        .money-bar {
            position: absolute; bottom: -35px; left: 50%; transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8); color: #f1c40f; padding: 4px 8px; border-radius: 12px; 
            font-size: 14px; font-weight: bold; white-space: nowrap; border: 1px solid #f39c12;
        }
        .money-bar.bankrupt { color: #e74c3c; border-color: #e74c3c; }

        #char-cuibi { background-image: url('cuibi.png'); }
        #char-bota { background-image: url('波塔.png'); }
        #char-tsui { background-image: url('萃之助.png'); }
        #char-kaka { background-image: url('喀喀.png'); }


        /* UI 與大廳 */
        #ui-layer { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; gap: 15px; z-index: 100; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; color: white; background-color: #e67e22; border: none; border-radius: 30px; box-shadow: 0 6px 10px rgba(0,0,0,0.4); cursor: pointer; transition: all 0.2s; }
        button:active { transform: translateY(3px); box-shadow: 0 3px 5px rgba(0,0,0,0.4); }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; transform: none; box-shadow: none;}
        #btn-locate { background-color: #2980b9; }

        #turn-indicator { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); padding: 10px 25px; border-radius: 20px; font-size: 18px; font-weight: bold; color: #2c3e50; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 100; display: none; }

        /* 主動選擇大廳畫面 */
        #lobby-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #2c3e50; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .lobby-box { background: white; color: #333; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px; width: 90%; }
        .lobby-box h2 { margin-top: 0; color: #e67e22; font-size: 28px;}
        .player-slot { display: flex; justify-content: space-between; align-items: center; background: #ecf0f1; padding: 10px 20px; margin: 10px 0; border-radius: 10px; font-weight: bold; }
        .is-bot { color: #e74c3c; font-size: 12px; }

        /* 中央事件框 */
        #event-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 200; display: none; justify-content: center; align-items: center; }
        #event-modal { background: white; width: 85%; max-width: 400px; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #modal-title { font-size: 26px; color: #2c3e50; font-weight: bold; margin-bottom: 10px; }
        #modal-desc { font-size: 18px; color: #34495e; margin-bottom: 25px; line-height: 1.6; white-space: pre-wrap; font-weight: 500;}
        .modal-btn { width: 100%; margin-bottom: 12px; }
        .btn-buy { background-color: #27ae60; }
        .btn-upgrade { background-color: #f39c12; }
        .btn-pay { background-color: #c0392b; }
        .btn-close { background-color: #95a5a6; }
    </style>
</head>
<body>

<!-- 大廳 -->
<div id="lobby-screen">
    <div class="lobby-box">
        <h2>渴口大富翁</h2>
        
        <!-- 模式選擇 -->
        <div id="lobby-mode-selection">
            <p style="margin-bottom: 20px; font-weight: bold;">歡迎來到竹北高鐵特區！</p>
            <button onclick="window.startBotMode()" style="width:100%; margin-bottom:15px; background-color:#27ae60;">🤖 電腦 PK 模式</button>
            <button onclick="window.showMultiplayerSetup()" style="width:100%; background-color:#8e44ad;">👥 真人連線對戰</button>
        </div>

        <!-- 真人連線設定 -->
        <div id="lobby-multiplayer-setup" style="display:none;">
            <p style="font-weight: bold;">輸入房間代碼 (建立或加入)：</p>
            <input type="text" id="input-room-id" value="coca-main" style="width:80%; padding:10px; font-size:16px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc; text-align:center;">
            <p id="room-id-display" style="font-weight:bold; color:#e67e22;"></p>
            <div id="players-list"></div>
            <button id="btn-start-game" style="width:100%; margin-top:20px; display:none;" onclick="window.startGame()"></button>
            <button onclick="window.backToLobby()" style="width:100%; margin-top:10px; background-color:#95a5a6;">返回上一頁</button>
            <p style="font-size:12px; color:#7f8c8d; margin-top:15px;">※ 房主開始後，空位由動物居民(電腦)接管</p>
        </div>
    </div>
</div>

<div id="turn-indicator"></div>

<div id="viewport">
    <div id="map">
        <div id="map-center-decor">
            <h1>COCA</h1>
            <h2>大富翁</h2>
        </div>
        <div id="char-cuibi" class="character"><div class="money-bar" id="money-cuibi">$5000</div></div>
        <div id="char-bota" class="character"><div class="money-bar" id="money-bota">$5000</div></div>
        <div id="char-kaka" class="character"><div class="money-bar" id="money-kaka">$5000</div></div>
        <div id="char-tsui" class="character"><div class="money-bar" id="money-tsui">$5000</div></div>
    </div>
</div>

<div id="ui-layer">
    <button id="btn-locate">📍 找主角</button>
    <button id="btn-roll" onclick="window.rollDice()">🎲 擲骰子</button>
</div>

<div id="event-modal-overlay">
    <div id="event-modal">
        <div id="modal-title"></div>
        <div id="modal-desc"></div>
        <div id="modal-actions"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAjLdcRZMsmgHppZkM9SuV2ikvBA5thnRw",
        authDomain: "coca-monopoly.firebaseapp.com",
        databaseURL: "https://coca-monopoly-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "coca-monopoly"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const currentRoom = urlParams.get('room') || 'coca-main';
    
    let MY_PLAYER_ID = localStorage.getItem('monopoly_pid') || null; 
    const PLAYER_ORDER = ['cuibi', 'bota', 'kaka', 'tsui'];
    const PLAYER_NAMES = { cuibi: '萃比老闆', bota: '波塔', kaka: '喀喀', tsui: '萃之助' };
    
    let roomData = {};
    let isGameRunning = false;
    let isMultiplayerMode = false;

    // 🗺️ 地圖與類別事件
    const mapEl = document.getElementById('map');
    const tileSize = 180; 
    const tilesData = [
        { title: "渴口手沖", desc: "回到溫暖的貨櫃屋\n老闆招待冰釀咖啡！", category: "event", type: "corner", price: 0 },
        { title: "文興路綠園道", category: "estate", type: "", price: 1000, rent: 200 },
        { title: "水圳森林公園", category: "event", type: "event", price: 0, desc: "舉辦草地野餐\n人氣大增，獲得 $500 贊助！" },
        { title: "嘉豐五路", category: "estate", type: "", price: 1200, rent: 250 },
        { title: "復興二路", category: "estate", type: "", price: 1000, rent: 200 },
        { title: "六家五路", category: "food", type: "", price: 1500, rent: 300 },
        { title: "隘口六街", category: "estate", type: "", price: 2000, rent: 400 },
        { title: "六家火車站", category: "event", type: "corner", price: 0, desc: "搭乘火車\n下回合移動速度加倍！(暫無效果)" },
        { title: "6+Plaza", category: "biz", type: "", price: 2500, rent: 500 },
        { title: "元大銀行", category: "event", type: "event", price: 0, desc: "股市大爆發！\n全民普發股息 $1000！" },
        { title: "暐順經貿", category: "biz", type: "", price: 3000, rent: 600 },
        { title: "復興一路", category: "biz", type: "", price: 2800, rent: 550 },
        { title: "嘉豐南路", category: "biz", type: "", price: 3200, rent: 650 },
        { title: "微型工作室", category: "biz", type: "", price: 1500, rent: 300 },
        { title: "竹北強風", category: "event", type: "corner", price: 0, desc: "九降風太強了！\n被吹退 3 步！" },
        { title: "聯發科", category: "biz", type: "", price: 5000, rent: 1500 },
        { title: "生醫一路", category: "biz", type: "", price: 2000, rent: 400 },
        { title: "台大醫院", category: "event", type: "event", price: 0, desc: "健康檢查自費項目\n支付醫療費 $800！" },
        { title: "筑波醫電", category: "biz", type: "", price: 2500, rent: 500 },
        { title: "綠能中心", category: "biz", type: "", price: 2200, rent: 450 },
        { title: "高鐵站前", category: "estate", type: "", price: 4000, rent: 1000 },
        { title: "高鐵新竹站", category: "event", type: "corner", price: 0, desc: "錯過高鐵班次\n在車站喝咖啡休息一回合。" },
        { title: "宏匯高鐵之心", category: "biz", type: "", price: 3500, rent: 800 },
        { title: "人氣牙醫", category: "event", type: "event", price: 0, desc: "預約額滿，現場苦等\n繳納掛號費 $300。" },
        { title: "光明六路", category: "estate", type: "", price: 1800, rent: 350 },
        { title: "地方稅務局", category: "event", type: "event", price: 0, desc: "繳納房屋稅與地價稅\n大失血 $1500！" },
        { title: "遇到垃圾車", category: "event", type: "event", price: 0, desc: "給力給力給～\n追垃圾車太累，掉落 $500。" },
        { title: "站前公寓", category: "estate", type: "", price: 2800, rent: 550 }
    ];

    function getTilePosition(index) {
        let x = 0, y = 0;
        if (index < 8) { x = index; y = 0; } else if (index < 14) { x = 7; y = index - 7; } 
        else if (index < 22) { x = 21 - index; y = 7; } else { x = 0; y = 28 - index; }
        return { x: x * tileSize, y: y * tileSize };
    }

    tilesData.forEach((tile, index) => {
        const div = document.createElement('div');
        div.className = `tile ${tile.type || tile.category}`;
        div.id = `tile-${index}`;
        div.setAttribute('onclick', `window.showTileInfo(${index})`);
        const pos = getTilePosition(index);
        div.style.left = pos.x + 'px'; div.style.top = pos.y + 'px';
        div.innerHTML = `<div class="tile-id">${index}</div><div class="tile-title">${tile.title}</div><div class="tile-desc">${tile.price ? '$'+tile.price : ''}</div><div class="tile-owner" id="owner-${index}"></div><div class="tile-level" id="level-${index}"></div>`;
        mapEl.appendChild(div);
    });

    const viewport = document.getElementById('viewport');
    let isDragging = false, startX, startY, initialTx, initialTy, currentTx = 0, currentTy = 0;
    const clamp = (val, min, max) => Math.max(min, Math.min(max, val));
    viewport.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX; startY = e.clientY; initialTx = currentTx; initialTy = currentTy; mapEl.style.transition = 'none'; });
    window.addEventListener('mousemove', e => { if (!isDragging) return; const maxW = viewport.clientWidth - tileSize*8, maxH = viewport.clientHeight - tileSize*8; currentTx = clamp(initialTx + e.clientX - startX, maxW, 0); currentTy = clamp(initialTy + e.clientY - startY, maxH, 0); mapEl.style.transform = `translate(${currentTx}px, ${currentTy}px)`; });
    window.addEventListener('mouseup', () => { isDragging = false; mapEl.style.transition = 'transform 0.2s ease-out'; });
    viewport.addEventListener('touchstart', e => { isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; initialTx = currentTx; initialTy = currentTy; mapEl.style.transition = 'none'; }, {passive: false});
    window.addEventListener('touchmove', e => { if (e.cancelable) e.preventDefault(); if (!isDragging) return; const maxW = viewport.clientWidth - tileSize*8, maxH = viewport.clientHeight - tileSize*8; currentTx = clamp(initialTx + e.touches[0].clientX - startX, maxW, 0); currentTy = clamp(initialTy + e.touches[0].clientY - startY, maxH, 0); mapEl.style.transform = `translate(${currentTx}px, ${currentTy}px)`; }, {passive: false});
    window.addEventListener('touchend', () => { isDragging = false; mapEl.style.transition = 'transform 0.2s ease-out'; });

    function focusCameraOn(posIndex) {
        const coords = getTilePosition(posIndex), maxW = viewport.clientWidth - tileSize*8, maxH = viewport.clientHeight - tileSize*8;
        currentTx = clamp(-(coords.x - viewport.clientWidth/2 + tileSize/2), maxW, 0); currentTy = clamp(-(coords.y - viewport.clientHeight/2 + tileSize/2), maxH, 0);
        mapEl.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)'; mapEl.style.transform = `translate(${currentTx}px, ${currentTy}px)`;
    }

    // 📡 監聽系統與大廳切換
    const roomRef = ref(db, 'rooms/' + currentRoom);
    onValue(roomRef, (snapshot) => {
        roomData = snapshot.val() || {};
        
        if ((!roomData.status || roomData.status === 'waiting') && isMultiplayerMode) {
            document.getElementById('lobby-mode-selection').style.display = 'none';
            document.getElementById('lobby-multiplayer-setup').style.display = 'block';
            document.getElementById('room-id-display').innerText = `連線代碼：${currentRoom}`;
            renderLobbyPlayers();
            return;
        }

        if (!roomData.status && !isMultiplayerMode) {
            document.getElementById('lobby-screen').style.display = 'flex';
            document.getElementById('lobby-mode-selection').style.display = 'block';
            document.getElementById('lobby-multiplayer-setup').style.display = 'none';
            return;
        }

        if (roomData.status === 'playing' && !isGameRunning) {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('viewport').style.display = 'block';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('turn-indicator').style.display = 'block';
            isGameRunning = true;
        }

        updateBoardVisuals();
        handleTurnLogic();
    });

    // 🎯 模式選擇
    window.startBotMode = function() {
        const timestampRoom = 'bot-' + Math.floor(Math.random() * 10000);
        window.location.href = `?room=${timestampRoom}&mode=single`;
    }

    if(urlParams.get('mode') === 'single') {
        MY_PLAYER_ID = 'cuibi'; 
        const updates = { status: 'playing', turnIndex: 0 };
        PLAYER_ORDER.forEach(pid => {
            updates[`players/${pid}`] = { money: 5000, position: 0, isBot: (pid !== 'cuibi') };
        });
        update(roomRef, updates);
    }

    window.showMultiplayerSetup = function() {
        const inputId = document.getElementById('input-room-id').value;
        if(inputId && inputId !== currentRoom) {
            window.location.href = `?room=${inputId}`;
            return;
        }
        isMultiplayerMode = true;
        get(roomRef).then((snapshot) => { roomData = snapshot.val() || {}; renderLobbyPlayers(); });
    }

    window.backToLobby = function() {
        isMultiplayerMode = false;
        document.getElementById('lobby-mode-selection').style.display = 'block';
        document.getElementById('lobby-multiplayer-setup').style.display = 'none';
    }

    function renderLobbyPlayers() {
        const players = roomData.players || {};
        let listHTML = ''; let isHost = false;
        
        if (!MY_PLAYER_ID) {
            for (let pid of PLAYER_ORDER) {
                if (!players[pid] || players[pid].isBot) {
                    MY_PLAYER_ID = pid; localStorage.setItem('monopoly_pid', pid);
                    set(ref(db, `rooms/${currentRoom}/players/${pid}`), { money: 5000, position: 0, isBot: false });
                    break;
                }
            }
        }
        if (MY_PLAYER_ID === 'cuibi') isHost = true;

        PLAYER_ORDER.forEach(pid => {
            const pData = players[pid];
            if (pData && !pData.isBot) {
                listHTML += `<div class="player-slot">${PLAYER_NAMES[pid]} <span style="color:#27ae60;">(真人 ${pid===MY_PLAYER_ID?' - 你':''})</span></div>`;
            } else {
                listHTML += `<div class="player-slot">${PLAYER_NAMES[pid]} <span class="is-bot">(等待真人加入...)</span></div>`;
            }
        });

        document.getElementById('players-list').innerHTML = listHTML;
        document.getElementById('btn-start-game').style.display = isHost ? 'block' : 'none';
        if(isHost) document.getElementById('btn-start-game').innerText = "🚀 房主確認，開始遊戲";
    }

    window.startGame = function() {
        const updates = { status: 'playing', turnIndex: 0 };
        PLAYER_ORDER.forEach(pid => {
            if (!roomData.players || !roomData.players[pid] || roomData.players[pid].isBot) {
                updates[`players/${pid}`] = { money: 5000, position: 0, isBot: true };
            }
        });
        update(roomRef, updates);
    }

    window.resetGame = function() {
        set(roomRef, { status: 'waiting' });
        window.location.href = window.location.pathname; // 重新載入清除參數
    }

    let knownPositions = { cuibi: 0, bota: 0, kaka: 0, tsui: 0 };
    function updateBoardVisuals() {
        const tiles = roomData.tiles || {};
        const players = roomData.players || {};

        for (let i = 0; i < 28; i++) {
            if (tiles[i]) {
                document.getElementById(`owner-${i}`).innerText = PLAYER_NAMES[tiles[i].owner];
                document.getElementById(`level-${i}`).innerText = '⭐'.repeat(tiles[i].level || 1);
            } else {
                document.getElementById(`owner-${i}`).innerText = '';
                document.getElementById(`level-${i}`).innerText = '';
            }
        }

        PLAYER_ORDER.forEach(pid => {
            const pData = players[pid];
            if(!pData) return;
            const moneyBar = document.getElementById(`money-${pid}`);
            moneyBar.innerText = `$${pData.money}`;
            if (pData.money <= 0) moneyBar.classList.add('bankrupt');
            else moneyBar.classList.remove('bankrupt');

            if (knownPositions[pid] !== pData.position) {
                walkPath(pid, knownPositions[pid], pData.position);
                knownPositions[pid] = pData.position;
            } else {
                setCharPosition(pid, pData.position);
            }
        });
    }

    async function walkPath(pid, start, end) {
        let current = start;
        while (current !== end) {
            current = (current + 1) % 28;
            setCharPosition(pid, current);
            await new Promise(r => setTimeout(r, 200)); 
        }
    }

    function setCharPosition(pid, posIndex) {
        const targetCoords = getTilePosition(posIndex);
        const el = document.getElementById(`char-${pid}`);
        let offsetX = 20, offsetY = 20;
        if(pid==='bota') offsetX = 95;
        if(pid==='kaka') offsetY = 95;
        if(pid==='tsui') { offsetX = 95; offsetY = 95; }
        el.style.left = (targetCoords.x + offsetX) + 'px';
        el.style.top = (targetCoords.y + offsetY) + 'px';
    }

    // 🏆 破產結算與回合邏輯
    function handleTurnLogic() {
        const players = roomData.players || {};
        let isGameOver = false; let bankruptPlayer = null;
        
        // 破產檢查
        PLAYER_ORDER.forEach(pid => {
            if (players[pid] && players[pid].money <= 0) {
                isGameOver = true; bankruptPlayer = PLAYER_NAMES[pid];
            }
        });

        if (isGameOver && roomData.status === 'playing') {
            document.getElementById('turn-indicator').innerText = "🛑 遊戲結束！";
            document.getElementById('btn-roll').disabled = true;
            
            let leaderboard = PLAYER_ORDER.map(pid => {
                let totalAssets = players[pid]?.money || 0;
                const tiles = roomData.tiles || {};
                for (let i = 0; i < 28; i++) {
                    if (tiles[i] && tiles[i].owner === pid) {
                        totalAssets += tilesData[i].price * (tiles[i].level || 1);
                    }
                }
                return { name: PLAYER_NAMES[pid], assets: totalAssets };
            });
            
            leaderboard.sort((a, b) => b.assets - a.assets);
            
            let resultHTML = `<h3 style="color:#e74c3c; margin-top:0;">【${bankruptPlayer}】破產了！</h3>`;
            resultHTML += `<div style="text-align:left; margin-top:15px; background:#f8f9fa; padding:15px; border-radius:10px;">`;
            leaderboard.forEach((player, index) => {
                resultHTML += `<p style="margin:8px 0; font-weight:bold;">🏆 第 ${index+1} 名：${player.name} <br><span style="color:#27ae60; font-size:14px;">💰 總資產：$${player.assets}</span></p>`;
            });
            resultHTML += `</div>`;
            resultHTML += `<button class="modal-btn btn-upgrade" style="margin-top:20px;" onclick="window.resetGame()">返回大廳重新開局</button>`;
            
            showSysModal("遊戲結算排行榜", resultHTML);
            return; 
        }

        const turnIndex = roomData.turnIndex || 0;
        const activePlayer = PLAYER_ORDER[turnIndex];
        const pData = players[activePlayer];

        document.getElementById('turn-indicator').innerText = `現在是【${PLAYER_NAMES[activePlayer]}】的回合`;
        const btnRoll = document.getElementById('btn-roll');
        
        if (activePlayer === MY_PLAYER_ID) {
            btnRoll.disabled = false; btnRoll.innerText = "🎲 換你擲骰子";
            focusCameraOn(pData.position);
        } else {
            btnRoll.disabled = true; btnRoll.innerText = `等待 ${PLAYER_NAMES[activePlayer]}...`;
            focusCameraOn(pData.position);
        }

        if (pData.isBot && MY_PLAYER_ID === 'cuibi' && !roomData.botActionState) {
            set(ref(db, `rooms/${currentRoom}/botActionState`), 'rolling');
            setTimeout(() => { executeBotTurn(activePlayer, pData); }, 1500);
        }
    }

    async function executeBotTurn(botId, pData) {
        const dice = Math.floor(Math.random() * 6) + 1;
        showSysModal(`【${PLAYER_NAMES[botId]}】行動`, `🎲 擲出了 ${dice} 點！\n移動中...`);
        
        const nextPos = (pData.position + dice) % 28;
        let newMoney = pData.money;
        if (nextPos < pData.position) newMoney += 2000;

        update(ref(db, `rooms/${currentRoom}/players/${botId}`), { position: nextPos, money: newMoney });

        setTimeout(() => {
            const tile = tilesData[nextPos];
            const tileData = (roomData.tiles || {})[nextPos];
            let decision = "結束回合。";

            if (tile.price > 0) {
                if (!tileData && newMoney >= tile.price && Math.random() > 0.3) {
                    decision = `決定投資【${tile.title}】！花費 $${tile.price}`;
                    newMoney -= tile.price;
                    update(ref(db, `rooms/${currentRoom}/tiles/${nextPos}`), { owner: botId, level: 1 });
                } else if (tileData && tileData.owner === botId && tileData.level < 3 && newMoney >= tile.price && Math.random() > 0.5) {
                    decision = `決定升級【${tile.title}】！花費 $${tile.price}`;
                    newMoney -= tile.price;
                    update(ref(db, `rooms/${currentRoom}/tiles/${nextPos}`), { level: tileData.level + 1 });
                } else if (tileData && tileData.owner !== botId) {
                    const rent = tile.rent * (tileData.level || 1);
                    decision = `踩到地雷！支付給 ${PLAYER_NAMES[tileData.owner]} $${rent}。`;
                    newMoney -= rent;
                    const oMoney = (roomData.players[tileData.owner]?.money || 0) + rent;
                    set(ref(db, `rooms/${currentRoom}/players/${tileData.owner}/money`), oMoney);
                }
            } else if(tile.category === 'event') {
                if(tile.title === "水圳森林公園") { decision="舉辦野餐，獲得 $500"; newMoney+=500; }
                if(tile.title === "元大銀行") { decision="領取股息 $1000"; newMoney+=1000; }
                if(tile.title === "台大醫院") { decision="支付醫療費 $800"; newMoney-=800; }
                if(tile.title === "人氣牙醫") { decision="支付掛號費 $300"; newMoney-=300; }
                if(tile.title === "地方稅務局") { decision="繳納稅金 $1500"; newMoney-=1500; }
                if(tile.title === "遇到垃圾車") { decision="追垃圾車掉落 $500"; newMoney-=500; }
            }

            set(ref(db, `rooms/${currentRoom}/players/${botId}/money`), newMoney);
            showSysModal(`【${PLAYER_NAMES[botId]}】抵達 ${tile.title}`, decision);
            
            setTimeout(() => { endTurn(); closeModal(); }, 2500);
        }, dice * 200 + 500);
    }

    const modalOverlay = document.getElementById('event-modal-overlay');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc = document.getElementById('modal-desc');
    const modalActions = document.getElementById('modal-actions');

    window.closeModal = function() { modalOverlay.style.display = 'none'; }
    function showSysModal(title, desc) {
        modalTitle.innerText = title; modalDesc.innerHTML = desc; modalActions.innerHTML = '';
        modalOverlay.style.display = 'flex';
    }

    window.showTileInfo = function(posIndex) {
        if(modalOverlay.style.display === 'flex') return;
        const tile = tilesData[posIndex]; const td = (roomData.tiles||{})[posIndex];
        modalTitle.innerText = `🔍 ${tile.title}`;
        let info = `${tile.desc || '可投資資產'}\n`;
        if (tile.price > 0) {
            info += `\n💰 基礎價格：$${tile.price}\n💸 目前過路費：$${tile.rent * (td ? td.level : 1)}`;
            info += td ? `\n👑 擁有者：${PLAYER_NAMES[td.owner]} (等級 ${td.level})` : `\n🟩 狀態：無人佔領`;
        }
        modalDesc.innerText = info;
        modalActions.innerHTML = `<button class="modal-btn btn-close" onclick="window.closeModal()">關閉</button>`;
        modalOverlay.style.display = 'flex';
    }

    window.rollDice = function() {
        document.getElementById('btn-roll').disabled = true;
        const pData = roomData.players[MY_PLAYER_ID];
        const dice = Math.floor(Math.random() * 6) + 1;
        const nextPos = (pData.position + dice) % 28; 
        
        let newMoney = pData.money;
        if (nextPos < pData.position) newMoney += 2000;

        update(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}`), { position: nextPos, money: newMoney });
        setTimeout(() => { showPlayerActionModal(nextPos); }, dice * 200 + 300);
    };

    function showPlayerActionModal(posIndex) {
        const tile = tilesData[posIndex];
        const td = (roomData.tiles||{})[posIndex];
        const pMoney = roomData.players[MY_PLAYER_ID].money;
        
        modalTitle.innerText = tile.title;
        modalOverlay.style.display = 'flex';
        const endBtn = `<button class="modal-btn btn-close" onclick="window.endTurn(); window.closeModal()">結束回合</button>`;

        if (tile.price > 0) {
            let actBuy="購買地產", actUp="升級地產", actRent="支付租金";
            if(tile.category==='food'){ actBuy="頂下餐館"; actUp="擴充包廂"; actRent="消費大餐"; }
            if(tile.category==='biz'){ actBuy="入股公司"; actUp="增資研發"; actRent="付授權費"; }

            if (!td) {
                modalDesc.innerText = `售價：$${tile.price} \n目前過路費：$${tile.rent}`;
                modalActions.innerHTML = `<button class="modal-btn btn-buy" onclick="window.buyLand(${posIndex}, ${tile.price})">${actBuy} ($${tile.price})</button>` + endBtn;
            } else if (td.owner === MY_PLAYER_ID) {
                if (td.level < 3) {
                    modalDesc.innerText = `這是你的地盤 (等級 ${td.level})\n升級可使過路費翻倍！`;
                    modalActions.innerHTML = `<button class="modal-btn btn-upgrade" onclick="window.upgradeLand(${posIndex}, ${tile.price}, ${td.level})">${actUp} ($${tile.price})</button>` + endBtn;
                } else {
                    modalDesc.innerText = `此處已達最高等級 ⭐⭐⭐\n躺著收錢吧！`;
                    modalActions.innerHTML = endBtn;
                }
            } else {
                const rent = tile.rent * td.level;
                modalDesc.innerText = `這是 ${PLAYER_NAMES[td.owner]} 的地盤！`;
                modalActions.innerHTML = `<button class="modal-btn btn-pay" onclick="window.payRent('${td.owner}', ${rent})">${actRent} ($${rent})</button>`;
            }
        } else {
            modalDesc.innerText = tile.desc;
            let finalMoney = pMoney;
            if(tile.title === "水圳森林公園") finalMoney+=500;
            if(tile.title === "元大銀行") finalMoney+=1000;
            if(tile.title === "台大醫院") finalMoney-=800;
            if(tile.title === "人氣牙醫") finalMoney-=300;
            if(tile.title === "地方稅務局") finalMoney-=1500;
            if(tile.title === "遇到垃圾車") finalMoney-=500;
            
            if(finalMoney !== pMoney) { set(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}/money`), finalMoney); }
            modalActions.innerHTML = endBtn;
        }
    }

    window.buyLand = function(pos, price) {
        const pMoney = roomData.players[MY_PLAYER_ID].money;
        if(pMoney >= price) {
            update(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}`), {money: pMoney - price});
            set(ref(db, `rooms/${currentRoom}/tiles/${pos}`), { owner: MY_PLAYER_ID, level: 1 });
            endTurn(); closeModal();
        } else alert("資金不足！");
    }

    window.upgradeLand = function(pos, price, currentLevel) {
        const pMoney = roomData.players[MY_PLAYER_ID].money;
        if(pMoney >= price) {
            update(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}`), {money: pMoney - price});
            update(ref(db, `rooms/${currentRoom}/tiles/${pos}`), { level: currentLevel + 1 });
            endTurn(); closeModal();
        } else alert("資金不足！");
    }

    window.payRent = function(ownerId, rent) {
        const pMoney = roomData.players[MY_PLAYER_ID].money;
        update(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}`), {money: pMoney - rent});
        const oMoney = roomData.players[ownerId].money;
        set(ref(db, `rooms/${currentRoom}/players/${ownerId}/money`), oMoney + rent);
        endTurn(); closeModal();
    }

    window.endTurn = function() {
        const nextTurn = ((roomData.turnIndex || 0) + 1) % 4;
        update(roomRef, { turnIndex: nextTurn, botActionState: null });
    }

    document.getElementById('btn-locate').addEventListener('click', () => { focusCameraOn(roomData.players[MY_PLAYER_ID].position); });

</script>
</body>
