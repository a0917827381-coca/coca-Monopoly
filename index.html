<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>渴口手沖大富翁 - 即時競標版</title>
    <style>
        :root { --tile-size: 180px; --map-size: calc(var(--tile-size) * 8); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a252f; font-family: 'Helvetica Neue', Arial, sans-serif; touch-action: none; }
        
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: grab; display: none; }
        #viewport:active { cursor: grabbing; }

        #map { width: var(--map-size); height: var(--map-size); position: absolute; top: 0; left: 0; background-color: #ecf0f1; transform-origin: top left; transition: transform 0.1s ease-out; box-shadow: 20px 20px 60px rgba(0,0,0,0.8); border-radius: 20px; }

        #map-center-decor { position: absolute; top: var(--tile-size); left: var(--tile-size); width: calc(var(--map-size) - var(--tile-size) * 2); height: calc(var(--map-size) - var(--tile-size) * 2); background-color: #fdfbf7; border: 6px dashed #bdc3c7; box-sizing: border-box; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.8; pointer-events: none; }

        #map-center-decor h2 { font-size: 60px; color: #7f8c8d; margin: 0; text-shadow: 3px 3px 0px rgba(0,0,0,0.1);}

        .tile { width: var(--tile-size); height: var(--tile-size); position: absolute; box-sizing: border-box; background-color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; border-radius: 16px; border: 2px solid #34495e; border-bottom: 12px solid #2c3e50; border-right: 6px solid #2c3e50; box-shadow: 4px 8px 15px rgba(0,0,0,0.3); background: linear-gradient(135deg, #ffffff 0%, #f1f2f6 100%); }
        .tile:active { transform: translateY(4px) translateX(2px); border-bottom-width: 8px; border-right-width: 4px; }
        .tile-id { font-size: 14px; color: #7f8c8d; position: absolute; top: 10px; left: 10px; font-weight: bold;}
        .tile-title { font-size: 22px; font-weight: bold; color: #2c3e50; pointer-events: none; text-shadow: 1px 1px 0px rgba(255,255,255,0.8);}
        .tile-desc { font-size: 15px; color: #e74c3c; margin-top: 8px; pointer-events: none; font-weight: bold;}
        .tile-owner { font-size: 14px; color: #27ae60; font-weight: bold; margin-top: 5px; height: 18px; pointer-events: none;}
        .tile-level { font-size: 14px; color: #f39c12; margin-top: 2px; height: 18px; pointer-events: none;}
        
        .tile.corner { background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%); border-bottom-color: #d35400; border-right-color: #d35400;} 
        .tile.event { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); border-bottom-color: #732d91; border-right-color: #732d91;} 
        .tile.event .tile-title, .tile.event .tile-desc { color: white; text-shadow: 1px 1px 0px rgba(0,0,0,0.3);}

        .character { width: 70px; height: 70px; position: absolute; border-radius: 50%; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: #fff; border: 4px solid #34495e; filter: drop-shadow(8px 12px 6px rgba(0,0,0,0.5)); transition: left 0.2s linear, top 0.2s linear; z-index: 10; pointer-events: none; animation: floatChar 2s ease-in-out infinite; }
        @keyframes floatChar { 0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); } }
        .money-bar { display: none; }

        #char-cuibi { background-image: url('cuibi.png'); } #char-bota { background-image: url('bota.png'); } #char-tsui { background-image: url('tsui.png'); } #char-kaka { background-image: url('kaka.png'); }

        #ui-layer { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; gap: 15px; z-index: 100; width: 90%; max-width: 400px; justify-content: center;}
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; color: white; background-color: #e67e22; border: none; border-radius: 30px; box-shadow: 0 6px 10px rgba(0,0,0,0.4); cursor: pointer; transition: all 0.2s; white-space: nowrap;}
        button:active { transform: translateY(3px); box-shadow: 0 3px 5px rgba(0,0,0,0.4); }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; transform: none; box-shadow: none;}
        #btn-locate { background-color: #2980b9; }
        
        #turn-indicator { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); padding: 10px 25px; border-radius: 20px; font-size: 18px; font-weight: bold; color: #2c3e50; box-shadow: 0 4px 10px rgba(0,0,0,0.4); z-index: 100; display: none; border: 2px solid #bdc3c7;}

        #scoreboard { position: fixed; top: 20px; left: 20px; background: rgba(255,255,255,0.95); padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; border: 2px solid #bdc3c7; display: none; flex-direction: column; gap: 8px; pointer-events: none; min-width: 180px;}
        #scoreboard-title { font-size: 14px; font-weight: bold; color: #7f8c8d; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; margin-bottom: 5px; text-align: center;}
        .score-row { display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: bold; color: #2c3e50; }
        .score-color { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #333;}
        .color-cuibi { background: #e74c3c; } .color-bota { background: #3498db; } .color-kaka { background: #f1c40f; } .color-tsui { background: #2ecc71; }
        .score-assets { font-size: 13px; color: #7f8c8d; margin-left: 18px; margin-top: 2px;}

        @media (max-width: 768px) {
            #scoreboard { top: auto; bottom: 90px; left: 10px; padding: 10px; min-width: 150px; background: rgba(255,255,255,0.85); box-shadow: none;}
            #scoreboard-title { font-size: 12px; } .score-row { font-size: 13px; } .score-assets { font-size: 11px; }
            #turn-indicator { top: 15px; padding: 8px 15px; font-size: 14px; } #ui-layer { bottom: 20px; gap: 10px; } button { padding: 12px 20px; font-size: 16px; }
        }

        #lobby-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #2c3e50; z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; overflow-y: auto;}
        .lobby-box { background: white; color: #333; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 450px; width: 90%; margin: 20px 0;}
        .lobby-box h2 { margin-top: 0; color: #e67e22; font-size: 28px; border-bottom: 2px solid #ecf0f1; padding-bottom: 15px;}
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .char-card { background: #f8f9fa; border: 2px solid #bdc3c7; border-radius: 10px; padding: 15px 10px; cursor: pointer; transition: all 0.2s; position: relative;}
        .char-card.taken { opacity: 0.5; cursor: not-allowed; border-color: #ecf0f1; } .char-card.selected { border-color: #27ae60; background: #e8f8f5; box-shadow: 0 0 0 2px #27ae60; }
        .char-img-preview { width: 80px; height: 80px; background-size: contain; background-repeat: no-repeat; background-position: center; margin: 0 auto 10px; border-radius: 50%;}
        .preview-kaka { background-image: url('kaka.png'); } .preview-cuibi { background-image: url('cuibi.png'); } .preview-bota { background-image: url('bota.png'); } .preview-tsui { background-image: url('tsui.png'); }
        .char-name { font-weight: bold; color: #2c3e50; font-size: 16px; margin-bottom: 5px;} .char-status { font-size: 12px; color: #7f8c8d; } .char-status.host { color: #8e44ad; font-weight: bold;} .char-status.me { color: #27ae60; font-weight: bold;}

        /* 🎲 儀式與互動框 */
        #dice-ritual-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 500; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; }
        #dice-ritual-title { font-size: 32px; font-weight: bold; margin-bottom: 30px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .dice-cube { font-size: 100px; width: 150px; height: 150px; background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%); color: #2c3e50; display: flex; justify-content: center; align-items: center; border-radius: 25px; box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 15px 30px rgba(0,0,0,0.6); border: 4px solid #bdc3c7; font-weight: bold; transition: transform 0.3s; }
        @keyframes shakeDice { 0% { transform: rotate(0deg) scale(1); } 25% { transform: rotate(20deg) scale(1.1); } 50% { transform: rotate(0deg) scale(1); } 75% { transform: rotate(-20deg) scale(1.1); } 100% { transform: rotate(0deg) scale(1); } }

        #event-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 200; display: none; justify-content: center; align-items: center; }
        #event-modal { background: white; width: 85%; max-width: 400px; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 4px solid #bdc3c7;}
        #modal-title { font-size: 28px; color: #2c3e50; font-weight: bold; margin-bottom: 10px; }
        #modal-desc { font-size: 18px; color: #34495e; margin-bottom: 25px; line-height: 1.6; white-space: pre-wrap; font-weight: 500;}
        .modal-btn { width: 100%; margin-bottom: 12px; }
        .btn-buy { background-color: #27ae60; } .btn-upgrade { background-color: #f39c12; } .btn-pay { background-color: #c0392b; } .btn-close { background-color: #95a5a6; }

        /* 🔨 拍賣專屬樣式 */
        #auction-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 400; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #auction-modal { background: #fdfbf7; width: 85%; max-width: 400px; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 15px 50px rgba(230, 126, 34, 0.4); border: 4px solid #e67e22;}
        .auc-title { font-size: 28px; color: #d35400; font-weight: bold; margin-bottom: 10px; }
        .auc-prop { font-size: 22px; color: #2c3e50; margin-bottom: 20px; font-weight: bold;}
        .auc-price { font-size: 40px; color: #27ae60; font-weight: bold; margin-bottom: 5px; }
        .auc-bidder { font-size: 16px; color: #7f8c8d; margin-bottom: 20px;}
        .auc-timer { font-size: 18px; color: #e74c3c; font-weight: bold; margin-bottom: 20px; background: #fadbd8; padding: 5px 15px; border-radius: 20px; display: inline-block;}
        .auc-btns { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="lobby-screen">
    <div class="lobby-box">
        <h2>渴口大富翁</h2>
        <div id="lobby-state-mode">
            <p style="margin-bottom: 20px; font-weight: bold; color:#34495e;">歡迎來到竹北高鐵特區！<br>請選擇遊玩模式</p>
            <button onclick="window.goStateSingle()" style="width:100%; margin-bottom:15px; background-color:#27ae60;">🤖 單機電腦 PK</button>
            <button onclick="window.goStateMultiInput()" style="width:100%; background-color:#8e44ad;">👥 真人連線對戰</button>
        </div>
        <div id="lobby-state-single" style="display:none;">

                <div class="char-card" onclick="window.startSingleGame('bota')"><div class="char-img-preview preview-bota"></div><div class="char-name">波塔</div></div>
                <div class="char-card" onclick="window.startSingleGame('kaka')"><div class="char-img-preview preview-kaka"></div><div class="char-name">喀喀</div></div>
                <div class="char-card" onclick="window.startSingleGame('tsui')"><div class="char-img-preview preview-tsui"></div><div class="char-name">萃之助</div></div>

            <button onclick="window.joinMultiRoom()" style="width:100%; margin-bottom:15px; background-color:#2980b9;">進入等候室</button>
            <button onclick="window.backToMode()" style="width:100%; background-color:#95a5a6; padding: 10px;">返回</button>

        <div id="lobby-state-multi-room" style="display:none;">

            <button id="btn-start-multi" style="width:100%; margin-bottom:15px; background-color:#e67e22; display:none;" onclick="window.startMultiGame()">🚀 房主開始遊戲</button>
            <button onclick="window.leaveRoom()" style="width:100%; background-color:#95a5a6; padding: 10px;">離開房間</button>

</div>

<div id="turn-indicator"></div>
<div id="scoreboard"><div id="scoreboard-title">📈 資產與狀態</div><div id="scoreboard-list"></div></div>

<script type="module">

    import { getDatabase, ref, set, onValue, get, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAjLdcRZMsmgHppZkM9SuV2ikvBA5thnRw", authDomain: "coca-monopoly.firebaseapp.com", databaseURL: "https://coca-monopoly-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "coca-monopoly" };

    setInterval(() => { if (roomData && roomData.status === 'playing' && MY_PLAYER_ID === roomData.hostId) update(ref(db, `rooms/${currentRoom}`), { lastActive: Date.now() }); }, 60000); 

    const LOCATION_EVENTS = {

    function showGameOverModal() {
        if (isShowingGameOver) return; isShowingGameOver = true; document.getElementById('turn-indicator').innerText = "🛑 遊戲結束！"; document.getElementById('btn-roll').disabled = true;
        const players = roomData.players || {}; let leaderboard = PLAYER_ORDER.map(pid => { let totalAssets = players[pid]?.money || 0; const tiles = roomData.tiles || {}; for (let i = 0; i < 28; i++) { if (tiles[i] && tiles[i].owner === pid) totalAssets += tilesData[i].price * (tiles[i].level || 1); } return { name: PLAYER_NAMES[pid], assets: totalAssets }; }); leaderboard.sort((a, b) => b.assets - a.assets);
        let resultHTML = `<h3 style="color:#e74c3c; margin-top:0;">【${roomData.bankruptPlayer}】破產了！</h3><div style="text-align:left; margin-top:15px; background:#f8f9fa; padding:15px; border-radius:10px;">`;
        leaderboard.forEach((player, index) => { resultHTML += `<p style="margin:8px 0; font-weight:bold;">🏆 第 ${index+1} 名：${player.name} <br><span style="color:#27ae60; font-size:14px;">💰 總資產：$${player.assets}</span></p>`; });
        resultHTML += `</div><button class="modal-btn btn-upgrade" style="margin-top:20px;" onclick="window.location.reload()">返回大廳重新開局</button>`;
        document.getElementById('modal-title').innerText = "遊戲結算排行榜"; document.getElementById('modal-desc').innerHTML = resultHTML; document.getElementById('modal-actions').innerHTML = ''; document.getElementById('event-modal-overlay').style.display = 'flex';
    }

    window.initiateRoll = function() { document.getElementById('btn-roll').disabled = true; update(ref(db, `rooms/${currentRoom}`), { actionState: 'rolling', lastActive: Date.now() }); const dice = Math.floor(Math.random() * 6) + 1; update(ref(db, `rooms/${currentRoom}/lastRoll`), { player: MY_PLAYER_ID, point: dice, time: Date.now() }); };

    function processHumanMove(point) {
        const pData = roomData.players[MY_PLAYER_ID]; const nextPos = (pData.position + point) % 28; let newMoney = pData.money; let newLaps = pData.laps || 0; if (nextPos < pData.position) { newMoney += 2000; newLaps += 1; }
        update(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}`), { position: nextPos, money: newMoney, laps: newLaps }).then(() => { setTimeout(() => { showPlayerActionModal(nextPos); }, point * 200 + 300); });
    }

    function processBotMove(botId, point) {
        const pData = roomData.players[botId]; const nextPos = (pData.position + point) % 28; let newMoney = pData.money; let newLaps = pData.laps || 0; if (nextPos < pData.position) { newMoney += 2000; newLaps += 1; }
        let maxLaps = Math.max(...PLAYER_ORDER.map(p => roomData.players[p]?.laps || 0));

        setTimeout(() => {
            const tile = tilesData[nextPos]; const tileData = (roomData.tiles || {})[nextPos]; let decision = "結束回合。"; let updates = {}; updates[`players/${botId}/money`] = newMoney; updates[`players/${botId}/position`] = nextPos; updates[`players/${botId}/laps`] = newLaps;

            if (tile.price > 0) {
                if (!tileData) {
                    if (newMoney >= tile.price && Math.random() > 0.4) { decision = `決定投資【${tile.title}】！花費 $${tile.price}`; updates[`players/${botId}/money`] -= tile.price; updates[`tiles/${nextPos}`] = { owner: botId, level: 1 }; update(ref(db, `rooms/${currentRoom}`), updates).then(() => { showSysModal(`【${PLAYER_NAMES[botId]}】抵達 ${tile.title}`, decision); setTimeout(() => { window.endTurn(); closeModal(); }, 2500); }); } 
                    else { decision = `放棄購買【${tile.title}】，進入法拍流程！`; update(ref(db, `rooms/${currentRoom}`), updates).then(() => { showSysModal(`【${PLAYER_NAMES[botId]}】抵達 ${tile.title}`, decision); setTimeout(() => { window.startAuction(nextPos); }, 2500); }); } // 🤖 Bot 放棄購買，進入拍賣！
                } 
                else if (tileData.owner === botId && tileData.level < 3 && newMoney >= tile.price && Math.random() > 0.5) { decision = `決定升級【${tile.title}】！花費 $${tile.price}`; updates[`players/${botId}/money`] -= tile.price; updates[`tiles/${nextPos}/level`] = tileData.level + 1; update(ref(db, `rooms/${currentRoom}`), updates).then(() => { showSysModal(`【${PLAYER_NAMES[botId]}】抵達 ${tile.title}`, decision); setTimeout(() => { window.endTurn(); closeModal(); }, 2500); }); } 
                else if (tileData.owner !== botId) { const rent = tile.rent * (tileData.level || 1); let payRes = window.calcPayment(botId, rent); Object.assign(updates, payRes.updates); updates[`players/${tileData.owner}/money`] = (roomData.players[tileData.owner].money || 0) + rent; decision = `踩到地雷！支付給 ${PLAYER_NAMES[tileData.owner]} $${rent}。`; if (payRes.soldLogs.length > 0) decision += `\n(為籌錢已法拍變賣：${payRes.soldLogs.join(', ')})`; update(ref(db, `rooms/${currentRoom}`), updates).then(() => { showSysModal(`【${PLAYER_NAMES[botId]}】抵達 ${tile.title}`, decision); setTimeout(() => { window.endTurn(); closeModal(); }, 3500); }); }
                else { update(ref(db, `rooms/${currentRoom}`), updates).then(() => { window.endTurn(); }); } // 踩到自己的滿級地，直接結束
            } else if(tile.category === 'random_event') {
                let eventPool = [...(LOCATION_EVENTS[tile.title] || DEFAULT_EVENTS)]; if (maxLaps >= 2) eventPool = eventPool.concat(POWERFUL_EVENTS); 
                const ev = eventPool[Math.floor(Math.random() * eventPool.length)]; decision = `【突發事件】\n${ev.desc}`;
                if (ev.money) { if (ev.money > 0) { updates[`players/${botId}/money`] += ev.money; } else { let payRes = window.calcPayment(botId, Math.abs(ev.money)); Object.assign(updates, payRes.updates); if (payRes.soldLogs.length > 0) decision += `\n(為籌錢已法拍變賣：${payRes.soldLogs.join(', ')})`; } }
                if (ev.skip > 0) updates[`players/${botId}/skipTurns`] = (pData.skipTurns || 0) + ev.skip;
                if (ev.special === 'upgrade_random') { let tiles = roomData.tiles || {}; let myProps = Object.keys(tiles).filter(k => tiles[k].owner === botId && tiles[k].level < 3); if (myProps.length > 0) { let target = myProps[Math.floor(Math.random() * myProps.length)]; updates[`tiles/${target}/level`] = 3; decision += `\n(【${tilesData[target].title}】直升滿級！)`; } }
                if (ev.special === 'remove_random') { let tiles = roomData.tiles || {}; let myProps = Object.keys(tiles).filter(k => tiles[k].owner === botId); if (myProps.length > 0) { let target = myProps[Math.floor(Math.random() * myProps.length)]; updates[`tiles/${target}`] = null; decision += `\n(【${tilesData[target].title}】被強制徵收！)`; } }
                update(ref(db, `rooms/${currentRoom}`), updates).then(() => { showSysModal(`【${PLAYER_NAMES[botId]}】抵達 ${tile.title}`, decision); setTimeout(() => { window.endTurn(); closeModal(); }, 3500); });
            } else if(tile.category === 'corner_skip') { decision = tile.desc; updates[`players/${botId}/skipTurns`] = (pData.skipTurns || 0) + 1; update(ref(db, `rooms/${currentRoom}`), updates).then(() => { showSysModal(`【${PLAYER_NAMES[botId]}】抵達 ${tile.title}`, decision); setTimeout(() => { window.endTurn(); closeModal(); }, 2500); });} 
            else if(tile.category === 'start') { decision = tile.desc; update(ref(db, `rooms/${currentRoom}`), updates).then(() => { showSysModal(`【${PLAYER_NAMES[botId]}】抵達 ${tile.title}`, decision); setTimeout(() => { window.endTurn(); closeModal(); }, 2000); });}
        }, point * 200 + 500);
    }

    window.closeModal = function() { if (isShowingGameOver || roomData.auction) return; document.getElementById('event-modal-overlay').style.display = 'none'; }
    function showSysModal(title, desc) { if (isShowingGameOver || roomData.auction) return; document.getElementById('modal-title').innerText = title; document.getElementById('modal-desc').innerHTML = desc; document.getElementById('modal-actions').innerHTML = ''; document.getElementById('event-modal-overlay').style.display = 'flex'; }
    window.showTileInfo = function(posIndex) { if(document.getElementById('event-modal-overlay').style.display === 'flex' || isShowingGameOver || roomData.auction) return; const tile = tilesData[posIndex]; const td = (roomData.tiles||{})[posIndex]; document.getElementById('modal-title').innerText = `🔍 ${tile.title}`; let info = `${tile.desc || '可投資資產'}\n`; if (tile.price > 0) { info += `\n💰 基礎價格：$${tile.price}\n💸 目前過路費：$${tile.rent * (td ? td.level : 1)}`; info += td ? `\n👑 擁有者：${PLAYER_NAMES[td.owner]} (等級 ${td.level})` : `\n🟩 狀態：無人佔領`; } document.getElementById('modal-desc').innerText = info; document.getElementById('modal-actions').innerHTML = `<button class="modal-btn btn-close" onclick="window.closeModal()">關閉</button>`; document.getElementById('event-modal-overlay').style.display = 'flex'; }

    function showPlayerActionModal(posIndex) {
        if (isShowingGameOver) return;
        const tile = tilesData[posIndex]; const td = (roomData.tiles||{})[posIndex]; const pMoney = roomData.players[MY_PLAYER_ID].money;
        document.getElementById('modal-title').innerText = tile.title; document.getElementById('event-modal-overlay').style.display = 'flex';
        let maxLaps = Math.max(...PLAYER_ORDER.map(p => roomData.players[p]?.laps || 0)); const endBtn = `<button class="modal-btn btn-close" onclick="window.endTurn(); window.closeModal()">結束回合</button>`;

        if (tile.price > 0) {
            let actBuy="購買地產", actUp="升級地產", actRent="支付租金";
            if(tile.category==='food'){ actBuy="頂下餐館"; actUp="擴充包廂"; actRent="消費大餐"; } if(tile.category==='biz'){ actBuy="入股公司"; actUp="增資研發"; actRent="付授權費"; }
            if (!td) { document.getElementById('modal-desc').innerText = `售價：$${tile.price} \n目前過路費：$${tile.rent}`; document.getElementById('modal-actions').innerHTML = `<button class="modal-btn btn-buy" onclick="window.buyLand(${posIndex}, ${tile.price})">${actBuy} ($${tile.price})</button><button class="modal-btn btn-close" onclick="window.startAuction(${posIndex})">放棄購買 (進入法拍)</button>`; } // 🙋‍♂️ 放棄購買按鈕改為進入拍賣 
            else if (td.owner === MY_PLAYER_ID) { if (td.level < 3) { document.getElementById('modal-desc').innerText = `這是你的地盤 (等級 ${td.level})\n升級可使過路費翻倍！`; document.getElementById('modal-actions').innerHTML = `<button class="modal-btn btn-upgrade" onclick="window.upgradeLand(${posIndex}, ${tile.price}, ${td.level})">${actUp} ($${tile.price})</button>` + endBtn; } else { document.getElementById('modal-desc').innerText = `此處已達最高等級 ⭐⭐⭐\n躺著收錢吧！`; document.getElementById('modal-actions').innerHTML = endBtn; } } 
            else { const rent = tile.rent * td.level; document.getElementById('modal-desc').innerText = `這是 ${PLAYER_NAMES[td.owner]} 的地盤！\n須支付 $${rent}`; document.getElementById('modal-actions').innerHTML = `<button class="modal-btn btn-pay" onclick="window.payRent('${td.owner}', ${rent})">${actRent} ($${rent})</button>`; }
        } else if(tile.category === 'random_event') {
            let eventPool = [...(LOCATION_EVENTS[tile.title] || DEFAULT_EVENTS)]; if (maxLaps >= 2) eventPool = eventPool.concat(POWERFUL_EVENTS);
            const ev = eventPool[Math.floor(Math.random() * eventPool.length)]; document.getElementById('modal-desc').innerText = `【突發事件】\n${ev.desc}`;
            let updates = {}; let alertMsg = "";
            if (ev.money) { if (ev.money > 0) { updates[`players/${MY_PLAYER_ID}/money`] = pMoney + ev.money; } else { let payRes = window.calcPayment(MY_PLAYER_ID, Math.abs(ev.money)); Object.assign(updates, payRes.updates); if (payRes.soldLogs.length > 0) alertMsg = `現金不足！已自動法拍：\n${payRes.soldLogs.join(', ')}`; } }
            if (ev.skip > 0) updates[`players/${MY_PLAYER_ID}/skipTurns`] = (roomData.players[MY_PLAYER_ID].skipTurns || 0) + ev.skip;
            if (ev.special === 'upgrade_random') { let tiles = roomData.tiles || {}; let myProps = Object.keys(tiles).filter(k => tiles[k].owner === MY_PLAYER_ID && tiles[k].level < 3); if (myProps.length > 0) { let target = myProps[Math.floor(Math.random() * myProps.length)]; updates[`tiles/${target}/level`] = 3; alertMsg = `【${tilesData[target].title}】已直升滿級！`; } }
            if (ev.special === 'remove_random') { let tiles = roomData.tiles || {}; let myProps = Object.keys(tiles).filter(k => tiles[k].owner === MY_PLAYER_ID); if (myProps.length > 0) { let target = myProps[Math.floor(Math.random() * myProps.length)]; updates[`tiles/${target}`] = null; alertMsg = `【${tilesData[target].title}】已被強制徵收！`; } }
            if(Object.keys(updates).length > 0) { update(ref(db, `rooms/${currentRoom}`), updates).then(() => { if(alertMsg) setTimeout(()=>alert(alertMsg), 500); }); } document.getElementById('modal-actions').innerHTML = endBtn;
        } else if(tile.category === 'corner_skip') { document.getElementById('modal-desc').innerText = tile.desc; set(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}/skipTurns`), (roomData.players[MY_PLAYER_ID].skipTurns || 0) + 1); document.getElementById('modal-actions').innerHTML = endBtn; } 
        else if(tile.category === 'start') { document.getElementById('modal-desc').innerText = tile.desc; document.getElementById('modal-actions').innerHTML = endBtn; }
    }

    window.buyLand = function(pos, price) { const pMoney = roomData.players[MY_PLAYER_ID].money; if(pMoney >= price) { update(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}`), {money: pMoney - price}); set(ref(db, `rooms/${currentRoom}/tiles/${pos}`), { owner: MY_PLAYER_ID, level: 1 }); window.endTurn(); closeModal(); } else alert("資金不足！"); }
    window.upgradeLand = function(pos, price, currentLevel) { const pMoney = roomData.players[MY_PLAYER_ID].money; if(pMoney >= price) { update(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}`), {money: pMoney - price}); update(ref(db, `rooms/${currentRoom}/tiles/${pos}`), { level: currentLevel + 1 }); window.endTurn(); closeModal(); } else alert("資金不足！"); }
    window.payRent = function(ownerId, rent) { let payRes = window.calcPayment(MY_PLAYER_ID, rent); let updates = payRes.updates; updates[`players/${ownerId}/money`] = (roomData.players[ownerId].money || 0) + rent; update(ref(db, `rooms/${currentRoom}`), updates).then(() => { if(payRes.soldLogs.length > 0) alert(`現金不足！已自動法拍：\n${payRes.soldLogs.join('\n')}`); window.endTurn(); closeModal(); }); }
    window.endTurn = function() { const nextTurn = ((roomData.turnIndex || 0) + 1) % 4; update(ref(db, `rooms/${currentRoom}`), { turnIndex: nextTurn, actionState: null }); }
    document.getElementById('btn-locate').addEventListener('click', () => { focusCameraOn(roomData.players[MY_PLAYER_ID].position); });

</script>
</body>
