        const tile = tilesData[posIndex]; const td = (roomData.tiles||{})[posIndex]; const pMoney = roomData.players[MY_PLAYER_ID].money;
        modalTitle.innerText = tile.title; modalOverlay.style.display = 'flex';
        const endBtn = `<button class="modal-btn btn-close" onclick="window.endTurn(); window.closeModal()">結束回合</button>`;

        if (tile.price > 0) {
            let actBuy="購買地產", actUp="升級地產", actRent="支付租金";
            if(tile.category==='food'){ actBuy="頂下餐館"; actUp="擴充包廂"; actRent="消費大餐"; } if(tile.category==='biz'){ actBuy="入股公司"; actUp="增資研發"; actRent="付授權費"; }
            if (!td) { modalDesc.innerText = `售價：$${tile.price} \n目前過路費：$${tile.rent}`; modalActions.innerHTML = `<button class="modal-btn btn-buy" onclick="window.buyLand(${posIndex}, ${tile.price})">${actBuy} ($${tile.price})</button>` + endBtn; } 
            else if (td.owner === MY_PLAYER_ID) { if (td.level < 3) { modalDesc.innerText = `這是你的地盤 (等級 ${td.level})\n升級可使過路費翻倍！`; modalActions.innerHTML = `<button class="modal-btn btn-upgrade" onclick="window.upgradeLand(${posIndex}, ${tile.price}, ${td.level})">${actUp} ($${tile.price})</button>` + endBtn; } else { modalDesc.innerText = `此處已達最高等級 ⭐⭐⭐\n躺著收錢吧！`; modalActions.innerHTML = endBtn; } } 
            else { const rent = tile.rent * td.level; modalDesc.innerText = `這是 ${PLAYER_NAMES[td.owner]} 的地盤！`; modalActions.innerHTML = `<button class="modal-btn btn-pay" onclick="window.payRent('${td.owner}', ${rent})">${actRent} ($${rent})</button>`; }
        } else if(tile.category === 'random_event') {
            const eventPool = LOCATION_EVENTS[tile.title] || DEFAULT_EVENTS; const ev = eventPool[Math.floor(Math.random() * eventPool.length)]; modalDesc.innerText = `【突發事件】\n${ev.desc}`;
            let finalMoney = Math.max(0, pMoney + ev.money); if (finalMoney !== pMoney) set(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}/money`), finalMoney);
            if (ev.skip > 0) set(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}/skipTurns`), (roomData.players[MY_PLAYER_ID].skipTurns || 0) + ev.skip); modalActions.innerHTML = endBtn;
        } else if(tile.category === 'corner_skip') { modalDesc.innerText = tile.desc; set(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}/skipTurns`), (roomData.players[MY_PLAYER_ID].skipTurns || 0) + 1); modalActions.innerHTML = endBtn; } 
        else if(tile.category === 'start') { modalDesc.innerText = tile.desc; modalActions.innerHTML = endBtn; }
    }

    window.buyLand = function(pos, price) { const pMoney = roomData.players[MY_PLAYER_ID].money; if(pMoney >= price) { update(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}`), {money: pMoney - price}); set(ref(db, `rooms/${currentRoom}/tiles/${pos}`), { owner: MY_PLAYER_ID, level: 1 }); window.endTurn(); closeModal(); } else alert("資金不足！"); }
    window.upgradeLand = function(pos, price, currentLevel) { const pMoney = roomData.players[MY_PLAYER_ID].money; if(pMoney >= price) { update(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}`), {money: pMoney - price}); update(ref(db, `rooms/${currentRoom}/tiles/${pos}`), { level: currentLevel + 1 }); window.endTurn(); closeModal(); } else alert("資金不足！"); }
    window.payRent = function(ownerId, rent) { const pMoney = roomData.players[MY_PLAYER_ID].money; update(ref(db, `rooms/${currentRoom}/players/${MY_PLAYER_ID}`), {money: Math.max(0, pMoney - rent)}); const oMoney = roomData.players[ownerId].money; set(ref(db, `rooms/${currentRoom}/players/${ownerId}/money`), oMoney + rent); window.endTurn(); closeModal(); }
    window.endTurn = function() { const nextTurn = ((roomData.turnIndex || 0) + 1) % 4; update(roomRef, { turnIndex: nextTurn, actionState: null }); }
    document.getElementById('btn-locate').addEventListener('click', () => { focusCameraOn(roomData.players[MY_PLAYER_ID].position); });

</script>
</body>
